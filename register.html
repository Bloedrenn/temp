    </header> <!--Шапка страницы (сайта)-->
    <main>
      <h1 class="text-center mb-1">Создать аккаунт</h1>
      <form class="w-50 m-auto border p-3 rounded">
        <div class="field">
          <label for="nameInput" class="form-label">Имя:</label>
          <input
            id="nameInput"
            class="form-control"
            type="text"
            required
            minlength="3"
            maxlength="20"
            placeholder="Пример: Иван.."
          >
        </div>

        <div class="field">
          <label for="emailInput" class="form-label">Э-почта:</label>
          <input id="emailInput" class="form-control" type="email" placeholder="example@mail.com">
        </div>

        <div class="field">
          <label for="ageInput">Возраст:</label>
          <input id="ageInput" type="number" min="0" max="120">
        </div>

        <div class="field">
          <label for="passwordInput">Пароль:</label>
          <input id="passwordInput" type="password">
        </div>

        <!-- <div class="field">
          <label for="birthdayInput">День рождения:</label>
          <input id="birthdayInput" type="date">
        </div> -->

        <div class="field">
          <label for="birthdayInput">День рождения:</label>
          <input id="birthdayInput" type="datetime-local">
        </div>

        <div class="field">
          <input id="agreementCheckbox" type="checkbox" checked>
          <label for="agreementCheckbox">Согласен продать почку</label>
        </div>

        <div class="field">
          <input id="maleInput" type="radio" name="gender"> <!--checked-->
          <label for="maleInput">Мужской</label>

          <input id="femaleInput" type="radio" name="gender">
          <label for="femaleInput">Женский</label>
        </div>

        <label class="form-label">Выберите город:</label>
        <input class="form-control" list="cityOptions" placeholder="Начните вводить..">
        <datalist id="cityOptions">
          <option value="San Francisco">USA</option>
          <option value="London">UK</option>
          <option value="Moscow">Russia</option>
        </datalist>

        <div class="field">
          <label for="fileInput">Загрузите свою аватарку:</label>
          <input id="fileInput" class="form-control" type="file">
        </div>

        <div class="field">
          <label for="citySelect">Выберите свой город:</label>
          <select id="citySelect">
            <option>Москва</option>
            <option>Санкт-Петербург</option>
            <option>ЕКБ</option>
          </select>
        </div>

        <!-- <input type="search"> -->
        <!-- <input type="range"> -->
        <!-- <input type="color"> -->

        <button type="submit" class="btn btn-primary">Создать аккаунт</button>
        <!-- <input type="submit" value="Создать аккаунт"> -->
        <button type="reset" class="btn btn-outline-danger">Очистить</button>
      </form>
